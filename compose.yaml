services:
  vereinskasse:
    image: ghcr.io/simonkell/vereinskasse:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY muss gesetzt sein}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD muss gesetzt sein}
      DATA_DIR: /data
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - vereinskasse_data:/data
    labels:
      com.getarcaneapp.arcane.updater: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vereinskasse_data:
    name: vereinskasse_data
