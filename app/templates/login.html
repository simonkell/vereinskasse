{% extends "base.html" %}
{% block title %}Anmelden · Vereinskasse{% endblock %}
{% block content %}
<section class="login-card card">
  <div class="eyebrow">Vereinskasse</div>
  <h1>Willkommen zurück</h1>
  <p class="muted">Melde dich an, um Buchungen und Belege zu verwalten.</p>
  <form method="post" class="stack">
    <label>Passwort<input name="password" type="password" autocomplete="current-password" autofocus required></label>
    <button class="button primary" type="submit">Anmelden</button>
  </form>
</section>
{% endblock %}
